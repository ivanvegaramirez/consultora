<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultora Seguridad LATAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

       PICO PAL QUE LEE

    <section id="contacto" class="border-t border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900 py-24">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <p class="uppercase tracking-[0.25em] text-blue-400 text-sm mb-4">
                Contacto
            </p>

            <h2 class="text-5xl font-bold mb-8 leading-tight">
                Construyamos soluciones estratégicas.
            </h2>

            <p class="text-slate-400 text-xl leading-relaxed max-w-3xl mx-auto mb-12">
                Coordinemos una reunión para evaluar desafíos institucionales o corporativos.
            </p>

            <form action="https://formspree.io/f/xvzlnzvw" method="POST" class="max-w-3xl mx-auto space-y-6 text-left">
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Nombre Completo</label>
                        <input type="text" name="nombre" required placeholder="Tu nombre"
                            class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 text-white focus:outline-none focus:border-blue-700 transition-colors">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Correo Electrónico</label>
                        <input type="email" name="email" required placeholder="correo@ejemplo.com"
                            class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 text-white focus:outline-none focus:border-blue-700 transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Asunto</label>
                    <input type="text" name="asunto" required placeholder="Motivo de la consulta"
                        class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 text-white focus:outline-none focus:border-blue-700 transition-colors">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Descripción del Proyecto</label>
                    <textarea name="mensaje" rows="6" required placeholder="Escribe aquí los detalles..."
                        class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 text-white focus:outline-none focus:border-blue-700 transition-colors resize-none"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full bg-blue-700 hover:bg-blue-600 transition-all py-5 rounded-2xl text-xl font-bold shadow-2xl active:scale-[0.98]">
                        Enviar Información a Consultoría
                    </button>
                </div>
            </form>
            <div class="mt-16 flex flex-wrap justify-center gap-8 border-t border-slate-800 pt-12">
                <p class="text-slate-500">ivan.vega.ramirez@gmail.com</p>
                <p class="text-slate-500">LinkedIn Corporativo</p>
            </div>
        </div>
    </section>

</body>
</html>
